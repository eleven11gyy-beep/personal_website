<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星图 · Star Atlas</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loader">
    <div class="loader-content">
      <div class="loader-circle-container">
        <div class="loader-circle loader-circle-1"></div>
        <div class="loader-circle loader-circle-2"></div>
        <div class="loader-circle loader-circle-3"></div>
        <div class="loader-button loading" id="loader-button">
          <div class="loader-text" id="loader-text">Loading</div>
        </div>
      </div>
      <div class="loader-progress">0%</div>
    </div>
  </div>

  <canvas class="webgl"></canvas>

  <!-- Tooltip -->
  <div id="tooltip" class="tooltip hidden">
    <span class="tooltip-label"></span>
    <span class="tooltip-year"></span>
  </div>

  <!-- Planet Card -->
  <div id="card-overlay" class="card-overlay hidden">
    <div id="glass-card" class="glass-card planet-card">
      <button class="card-close" id="card-close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <!-- Layer 1: 主标题行 — 四字维度 + 英文胶囊 -->
      <div class="planet-card-header">
        <h2 class="planet-card-title"></h2>
        <span class="planet-card-english"></span>
      </div>
      <!-- Layer 2: 三意象标签 -->
      <div class="planet-card-tags">
        <span class="planet-card-tag"></span>
        <span class="planet-card-tag"></span>
        <span class="planet-card-tag"></span>
      </div>
      <!-- Layer 3: 分割线 -->
      <div class="planet-card-divider"></div>
      <!-- Layer 4: 底部诗意收尾短句 -->
      <p class="planet-card-footer"></p>
    </div>
  </div>

  <!-- Light Burst -->
  <div id="light-burst" class="light-burst hidden"></div>

  <!-- Control Bar -->
  <div id="control-bar">
    <div class="control-group">
      <button class="ctrl-btn" data-action="about">关于我</button>
      <button class="ctrl-btn" data-action="contact">联系</button>
    </div>
  </div>

  <!-- Easter Egg -->
  <div id="easter-egg" class="easter-egg hidden">
    <div class="easter-egg-slogan"></div>
    <div class="easter-egg-sub"></div>
  </div>

  <!-- About Modal -->
  <div id="about-modal" class="modal-overlay hidden">
    <div class="modal-card glass-card">
      <button class="card-close modal-close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <h2>关于我</h2>
      <p id="about-content"></p>
    </div>
  </div>

  <!-- Contact Modal -->
  <div id="contact-modal" class="modal-overlay hidden">
    <div class="modal-card glass-card">
      <button class="card-close modal-close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <h2>联系方式</h2>
      <div id="contact-content" class="contact-links"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
